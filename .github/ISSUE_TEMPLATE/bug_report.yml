name: Bug report
about: Melde einen Fehler in der App
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Beschreibung
      description: Was ist passiert?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zum Reproduzieren
      placeholder: |
        1. Öffne ...
        2. Lade ... hoch
        3. Klicke ...
        4. Fehler erscheint
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / Betriebssystem
      placeholder: Chrome 126 auf Windows 11
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots oder Dateien
      description: Bitte keine vertraulichen Kundendaten hochladen.
